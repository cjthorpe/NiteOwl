name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Build-both-editions matrix: {free, commercial}, both from ONE SHA. The
  # `free` leg is the load-bearing "free-without-ee" guard for the open-core
  # line: it physically deletes packages/ee-* (via scripts/ci/exclude-ee.sh)
  # BEFORE install, so the Apache-2.0 core must stand on its own. If any core
  # package or app grows a dependency on @niteowl/ee-* — a package.json entry or
  # a bare import — the free leg breaks at install / type-check / build. This is
  # the mechanical proof the release runbook relies on (docs/release-process.md
  # §4, §6.1: "do not tag unless both `CI / free` and `CI / commercial` are
  # green"). See docs/open-core.md. Restored in FUL-157 after the free/commercial
  # split (FUL-107 #41) was dropped during the ESLint-flat / Vitest-4 rewrites.
  ci:
    name: ${{ matrix.edition }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      # Always run both editions so we see exactly which one regressed.
      fail-fast: false
      matrix:
        edition: [free, commercial]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      # Free-edition guard: remove commercial (ee-*) code BEFORE install so a
      # stray core dependency on ee-* fails fast at resolution time.
      - name: Exclude commercial (ee-*) packages — free edition guard
        if: matrix.edition == 'free'
        run: ./scripts/ci/exclude-ee.sh

      # Commercial: lockfile must be exact. Free: the workspace was mutated
      # above, so the committed lockfile no longer matches — re-resolve is the
      # expected, intentional behaviour for this leg only.
      - name: Install dependencies (commercial)
        if: matrix.edition == 'commercial'
        run: pnpm install --frozen-lockfile

      - name: Install dependencies (free)
        if: matrix.edition == 'free'
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Type-check
        run: pnpm typecheck

      - name: Build shared
        run: pnpm --filter @niteowl/shared build

      - name: Test
        run: pnpm test

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so gitleaks can scan every commit, not just HEAD.
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: '8.21.2'
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan for secrets
        run: gitleaks detect --no-banner --redact --config .gitleaks.toml

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Blocking gate: fail on high+ advisories in shipped (production) deps.
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

      # Visibility only: surface dev-tooling advisories without blocking merges.
      # Dependabot raises PRs to remediate these over time.
      - name: Audit all dependencies (report-only)
        run: pnpm audit --audit-level moderate || true
