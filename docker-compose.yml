name: niteowl

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-niteowl}
      POSTGRES_USER: ${POSTGRES_USER:-niteowl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-niteowl_dev_password}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-niteowl}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      DATABASE_URL: postgresql://${POSTGRES_USER:-niteowl}:${POSTGRES_PASSWORD:-niteowl_dev_password}@postgres:5432/${POSTGRES_DB:-niteowl}
      REDIS_URL: redis://redis:6379
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./apps/api/src
          target: /app/apps/api/src
        - action: sync
          path: ./packages/shared/src
          target: /app/packages/shared/src
        - action: sync
          path: ./packages/types/src
          target: /app/packages/types/src
        - action: sync
          path: ./packages/db/src
          target: /app/packages/db/src
        - action: rebuild
          path: apps/api/package.json
        - action: rebuild
          path: packages/shared/package.json
        - action: rebuild
          path: packages/types/package.json
        - action: rebuild
          path: packages/db/package.json

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - '5173:5173'
    depends_on:
      - api
    develop:
      watch:
        - action: sync
          path: ./apps/web/src
          target: /app/apps/web/src
        - action: rebuild
          path: apps/web/package.json

volumes:
  postgres_data:
  redis_data:
